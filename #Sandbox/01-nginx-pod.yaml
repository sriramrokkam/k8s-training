# File: 01-nginx-pod.yaml
apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod
  namespace: i310202
  labels:
    app: nginx
    owner: i310202
spec:
  containers:
  - name: nginx
    image: nginx:mainline
    ports:
    - containerPort: 80
      name: http-port
    livenessProbe:
      httpGet:
        path: /
        port: http-port
      initialDelaySeconds: 3
      periodSeconds: 30