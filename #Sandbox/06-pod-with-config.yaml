# File: 06-pod-with-config.yaml
apiVersion: v1
kind: Pod
metadata:
  name: fortune-config-demo
  namespace: i310202
spec:
  containers:
  - name: app
    image: busybox
    command: ["sh", "-c", "echo Color=$APP_COLOR, Greeting=$GREETING, User=$DB_USER && sleep 3600"]
    env:
    - name: APP_COLOR
      valueFrom:
        configMapKeyRef:
          name: fortune-config
          key: APP_COLOR
    - name: GREETING
      valueFrom:
        configMapKeyRef:
          name: fortune-config
          key: GREETING
    - name: DB_USER
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: DB_USER
    - name: DB_PASSWORD
      valueFrom:
        secretKeyRef:
          name: db-credentials
          key: DB_PASSWORD
    volumeMounts:
    - name: config-volume
      mountPath: /etc/config
  volumes:
  - name: config-volume
    configMap:
      name: fortune-config