apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-server
  labels:
    tier: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-server
  template:
    metadata:
      labels:
        app: web-server
    spec:
      volumes:
      - name: content-storage
        persistentVolumeClaim:
          claimName: web-server-pvc
      containers:
      - name: nginx
        image: nginx:mainline
        ports:
        - containerPort: 80
        volumeMounts:
        - mountPath: "/usr/share/nginx/html"
          name: content-storage
