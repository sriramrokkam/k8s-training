---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mynginx
  labels:
    tier: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mynginx
  template:
    metadata:
      labels:
        app: mynginx
    spec:
      volumes:
      - name: index-html
        emptyDir: {}
      initContainers:
      - name: setup
        image: busybox
        command:
        - /bin/sh
        - -c
        - echo This is MY nginx! > /work-dir/index.html
        volumeMounts:
        - name: index-html
          mountPath: "/work-dir"
      containers:
      - name: nginx
        image: nginx:mainline
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: index-html
          mountPath: /usr/share/nginx/html

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: yournginx
  labels:
    tier: application
spec:
  replicas: 1
  selector:
    matchLabels:
      app: yournginx
  template:
    metadata:
      labels:
        app: yournginx
    spec:
      volumes:
      - name: index-html
        emptyDir: {}
      initContainers:
      - name: setup
        image: busybox
        command:
        - /bin/sh
        - -c
        - echo This is YOUR nginx! > /work-dir/index.html
        volumeMounts:
        - name: index-html
          mountPath: "/work-dir"
      containers:
      - name: nginx
        image: nginx:mainline
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: index-html
          mountPath: /usr/share/nginx/html
---
apiVersion: v1
kind: Service
metadata:
  name: mynginx-service
  labels:
    tier: networking
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
    name: http
  selector:
    app: mynginx
  type: ClusterIP
---
apiVersion: v1
kind: Service
metadata:
  name: yournginx-service
  labels:
    tier: networking
spec:
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
    name: http
  selector:
    app: yournginx
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: fanout-nginx
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /$2
    nginx.ingress.kubernetes.io/use-regex: "true"
spec:
  rules:
  - host: fanout-nginx.ingress.yul38.k8s-train.shoot.canary.k8s-hana.ondemand.com
    http:
      paths:
      - path: /my(.*)
        pathType: Prefix
        backend:
          service: 
            name: mynginx-service
            port: 
              name: http
      - path: /your(.*)
        pathType: Prefix
        backend:
          service:
            name: yournginx-service
            port:
              name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vh-nginx
spec:
  rules:
  - host: mynginx.ingress.yul38.k8s-train.shoot.canary.k8s-hana.ondemand.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mynginx-service
            port: 
              number: 80
  - host: yournginx.ingress.yul38.k8s-train.shoot.canary.k8s-hana.ondemand.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service: 
            name: yournginx-service
            port:
              number: 80
---
