apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: steakfulsets.food.training.sap
spec:
  group: food.training.sap
  names:
    kind: SteakfulSet
    listKind: SteakfulSetList
    plural: steakfulsets
    shortNames:
    - stks
    singular: steakfulset
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              properties:
                steak:
                  type: object
                  properties:
                    spec:
                      type: object
                      properties:
                        cookLevel:
                          type: string
                        fat:
                          type: string
                        weight:
                          type: integer
                        variant:
                          type: string
                      required:
                      - weight
                      - cookLevel
                      - fat
                      - variant
                  required:
                    - spec
                guests:
                  type: integer
              required:
              - steak
              - guests
            status:
              type: object
              properties:
                steaksServed:
                  type: integer
      subresources:
          status: {}
      additionalPrinterColumns:
      - name: Guests
        type: integer
        description: The number of guests served by this SteakfulSet, aka replicaCount.
        jsonPath: .spec.guests
      - name: Variant
        type: string
        description: The variant of the steak (rump-steak, tofu-steak, etc.)
        jsonPath: .spec.steak.spec.variant
      - name: Weight
        type: integer
        description: The weight of the steak.
        jsonPath: .spec.steak.spec.weight
      - name: Cooking
        type: string
        description: How would you like your steak?
        jsonPath: .spec.steak.spec.cookLevel
      - name: Fat
        type: string
        description: The amount of fat i.e. how juicy the steak will be.
        jsonPath: .spec.steak.spec.fat
      - name: Age
        type: date
        description: The age of the Steak object
        jsonPath: .metadata.creationTimestamp
